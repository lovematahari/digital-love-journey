<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Love Journey - Untuk Suki ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #2b1d1d; --card: rgba(255, 255, 255, 0.1); --text: #fff8e1; --accent: #ec407a; }
        body.mode-matahari { --bg: linear-gradient(135deg, #fff9c4 0%, #ffeb3b 100%); --text: #5d4037; --card: rgba(255,255,255,0.6); }
        body.mode-bulan { --bg: linear-gradient(135deg, #0d1117 0%, #161b22 100%); --text: #c9d1d9; --card: rgba(255,255,255,0.05); }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; transition: 1s; overflow-x: hidden; scroll-behavior: smooth; }
        #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .container { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: var(--card); padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; max-width: 450px; width: 90%; backdrop-filter: blur(15px); margin: 20px 0; border: 1px solid rgba(255,255,255,0.1); z-index: 10; }
        .theme-switch { position: fixed; top: 20px; right: 20px; z-index: 1000; background: var(--accent); color: white; border: none; padding: 10px; border-radius: 50%; cursor: pointer; font-size: 20px; }
        .polaroid-frame { background: white; padding: 10px 10px 35px 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: 0.5s; cursor: pointer; display: inline-block; width: 90%; margin: 20px 0; }
        .polaroid-frame img { width: 100%; height: auto; border: 1px solid #ddd; }
        .polaroid-frame:nth-child(odd) { transform: rotate(-5deg); }
        .polaroid-frame:nth-child(even) { transform: rotate(5deg); }
        .polaroid-frame:hover { transform: rotate(0deg) scale(1.1); z-index: 50; }
        .coupon { background: #fff; color: #333; padding: 15px; border-radius: 10px; border: 2px dashed var(--accent); margin-bottom: 10px; }
        .coupon button { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        .love-letter-icon { position: absolute; cursor: pointer; font-size: 30px; transition: 0.3s; z-index: 100; filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #333; padding: 25px; border-radius: 20px; z-index: 2000; width: 80%; max-width: 300px; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1999; }
        #mainContent { display: none; width: 100%; max-width: 500px; }
        .btn-yes { padding: 15px 30px; background: var(--accent); color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 18px; }
        #btn-no { position: absolute; background: #ff1744; color: white; border: none; border-radius: 10px; padding: 12px 25px; transition: 0.1s; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body class="mode-bulan">
    <canvas id="starfield"></canvas>
    <button class="theme-switch" onclick="toggleTheme()">☀️</button>

    <div class="love-letter-icon" style="top: 15%; left: 10%;" onclick="openLetter('Suki, makasih ya udah jadi bagian paling indah di hidupku selama 2 bulan ini. ❤️')">📩</div>
    <div class="love-letter-icon" style="bottom: 20%; right: 10%;" onclick="openLetter('Jangan pernah capek sama aku ya, I love you the most! 🦀☀️')">📩</div>

    <div class="container">
        <div id="questionBox" class="card">
            <h2>Happy 2nd Mensiversary! 🌻</h2>
            <p>Suki Suki masih sayang banget kan sama aku?</p>
            <div style="position: relative; height: 150px; width: 100%;">
                <button class="btn-yes" onclick="startJourney()">Sayang Banget!</button>
                <button id="btn-no" onmouseover="moveBtn()">Nggak</button>
            </div>
        </div>

        <div id="mainContent">
            <div class="card">
                <h3>Waktu Kita Berjalan... ⏳</h3>
                <div id="counter" style="font-size: 18px; font-weight: bold; color: var(--accent);"></div>
                <p style="font-size: 12px; margin-top: 10px;">Sejak 22 Januari 2026</p>
            </div>

            <div class="card">
                <h3>Memories of Us 📸</h3>
                <div class="polaroid-frame">
                    <img src="../assets/images/mensive-2/momen1.jpg.jpeg">
                    <p style="color: #333; font-family: 'Courier New'; font-weight: bold;">Our First Journey ❤️</p>
                </div>
                <div class="polaroid-frame">
                    <img src="../assets/images/mensive-2/momen2.jpg.jpeg">
                    <p style="color: #333; font-family: 'Courier New'; font-weight: bold;">Happy Mensive! ☀️</p>
                </div>
            </div>

            <div class="card">
                <h3>Digital Coupons for Suki 🎟️</h3>
                <div class="coupon"><b>🎟️ Kupon Makan Malam Bebas Pilih</b><button onclick="claimCoupon('Makan Malam')">Klaim Kupon</button></div>
                <div class="coupon"><b>🎟️ Kupon Peluk & Cium Gratis</b><button onclick="claimCoupon('Peluk & Cium')">Klaim Kupon</button></div>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeModal()"></div>
    <div class="modal" id="modal"><p id="modalText"></p><button onclick="closeModal()" style="background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 10px;">Tutup</button></div>

    <audio id="lagu" loop><source src="../assets/music/lagu.mp3.mp3" type="audio/mpeg"></audio>

    <script>
        const canvas = document.getElementById('starfield'); const ctx = canvas.getContext('2d');
        let stars = []; canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        function createStars() { stars = []; for(let i=0; i<150; i++) { stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.5, d: Math.random()*0.5 + 0.2}); } }
        function drawStars() { ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = "white"; stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill(); s.y += s.d; if(s.y > canvas.height) s.y = 0; }); requestAnimationFrame(drawStars); }
        createStars(); drawStars();
        function toggleTheme() { const body = document.body; const btn = document.querySelector('.theme-switch'); if(body.classList.contains('mode-bulan')) { body.classList.replace('mode-bulan', 'mode-matahari'); btn.innerText = "🌙"; } else { body.classList.replace('mode-matahari', 'mode-bulan'); btn.innerText = "☀️"; } }
        function moveBtn() { const btn = document.getElementById('btn-no'); btn.style.left = Math.random() * 70 + "%"; btn.style.top = Math.random() * 70 + "%"; }
        function startJourney() { confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); document.getElementById('lagu').play(); document.getElementById('questionBox').style.display = 'none'; document.getElementById('mainContent').style.display = 'block'; startCounter(); }
        function startCounter() { const start = new Date("2026-01-22T00:00:00").getTime(); setInterval(() => { const now = new Date().getTime(); const diff = now - start; const d = Math.floor(diff / (1000*60*60*24)); const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60)); const m = Math.floor((diff % (1000*60*60)) / (1000*60)); const s = Math.floor((diff % (1000*60)) / 1000); document.getElementById('counter').innerHTML = `${d} Hari, ${h} Jam, ${m} Menit, ${s} Detik`; }, 1000); }
        function claimCoupon(nama) { alert(`🎟️ Kupon ${nama} Berhasil Diklaim!\n\nJangan lupa screenshot dan kirim ke aku ya sayang! ❤️`); }
        function openLetter(msg) { document.getElementById('modalText').innerText = msg; document.getElementById('modal').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    </script>
</body>
</html>
